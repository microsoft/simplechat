<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
    <title id="title">User Support Menu Entry Placeholder</title>
    <desc id="desc">Placeholder image for a future screenshot of the user-facing Support Menu entry.</desc>
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f172a" />
            <stop offset="100%" stop-color="#92400e" />
        </linearGradient>
    </defs>
    <rect width="1600" height="900" fill="url(#bg)" />
    <rect x="80" y="80" width="1440" height="740" rx="32" fill="#ffffff" fill-opacity="0.12" stroke="#fde68a" stroke-width="4" />
    <text x="140" y="190" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="700">Screenshot Placeholder</text>
    <text x="140" y="260" fill="#fde68a" font-family="Segoe UI, Arial, sans-serif" font-size="34">User-facing Support Menu entry</text>
    <text x="140" y="360" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="600">Capture suggestion</text>
    <text x="140" y="420" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="24">- Show the user menu or navigation entry for Support Menu</text>
    <text x="140" y="465" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="24">- Include Latest Features and Send Feedback destinations</text>
    <text x="140" y="510" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="24">- Reinforce that this view is for non-admin users</text>
    <rect x="140" y="590" width="560" height="120" rx="18" fill="#fffbeb" fill-opacity="0.14" stroke="#fcd34d" stroke-width="3" />
    <text x="180" y="655" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="24">Replace this SVG with the final product screenshot.</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
    <title id="title">Revision Actions and Comparison Placeholder</title>
    <desc id="desc">Placeholder image for a future screenshot of revision-aware delete or comparison actions.</desc>
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#312e81" />
            <stop offset="100%" stop-color="#7f1d1d" />
        </linearGradient>
    </defs>
    <rect width="1600" height="900" fill="url(#bg)" />
    <rect x="80" y="80" width="1440" height="740" rx="32" fill="#ffffff" fill-opacity="0.12" stroke="#fecaca" stroke-width="4" />

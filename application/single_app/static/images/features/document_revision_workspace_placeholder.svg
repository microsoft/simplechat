<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
    <title id="title">Current Revision in Workspace Placeholder</title>
    <desc id="desc">Placeholder image for a future screenshot of current document revision state in a workspace listing.</desc>
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1f2937" />
            <stop offset="100%" stop-color="#7c3aed" />
        </linearGradient>
    </defs>
    <rect width="1600" height="900" fill="url(#bg)" />
    <rect x="80" y="80" width="1440" height="740" rx="32" fill="#ffffff" fill-opacity="0.12" stroke="#e9d5ff" stroke-width="4" />
    <text x="140" y="190" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="700">Screenshot Placeholder</text>
    <text x="140" y="260" fill="#ddd6fe" font-family="Segoe UI, Arial, sans-serif" font-size="34">Current revision state in workspace</text>
    <text x="140" y="360" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="600">Capture suggestion</text>
    <text x="140" y="420" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="24">- Show duplicate-name document with current revision visible</text>
    <text x="140" y="465" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="24">- Include version badge, revision indicator, or updated date</text>
    <text x="140" y="510" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="24">- Optional tag and classification metadata carried forward</text>
    <rect x="140" y="590" width="570" height="120" rx="18" fill="#faf5ff" fill-opacity="0.14" stroke="#c4b5fd" stroke-width="3" />
    <text x="180" y="655" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="24">Replace this SVG with the final product screenshot.</text>
</svg>